<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{background:black;color:white;font-family:sans-serif;margin:0}
h1{text-align:center;color:#ff3c00}

input{width:90%;margin:10px;padding:10px;border-radius:10px;border:none}

button{margin:3px;padding:8px;border:none;border-radius:10px;background:#ff3c00;color:white}

.scroll{display:flex;overflow-x:auto;gap:10px;padding:10px}

.producto{min-width:240px;background:#111;padding:10px;border-radius:10px}

.contador{display:flex;align-items:center;gap:5px}

#carrito{position:fixed;top:10px;right:10px;background:#ff3c00;padding:10px;border-radius:10px}

#panel{position:fixed;top:60px;right:10px;background:#111;padding:10px;border-radius:10px;width:280px;display:none}
</style>
</head>

<body>

<h1>🍕 Red Light Pizza</h1>

<input id="nombre" placeholder="Tu nombre (obligatorio)">

<div id="carrito" onclick="toggle()">🛒 <span id="totalItems">0</span> | $<span id="totalPrecio">0</span></div>

<div id="panel">
<div id="lista"></div>

<p>Agregar aderezo $25</p>
<button onclick="add('Aderezo',25)">+</button>

<p>Agregar bebida</p>
<button onclick="add('Coca',35)">Coca</button>
<button onclick="add('Sprite',35)">Sprite</button>

<button onclick="enviar()">Enviar WhatsApp</button>
</div>

<!-- ENTRADAS -->
<h2>Entradas</h2>
<div class="scroll">

<div class="producto">Chicken Tenders $200
<div class="contador">
<button onclick="rest('tenders')">-</button>
<button onclick="add('Chicken Tenders',200)">+</button>
</div></div>

<div class="producto">Papas francesa $90
<div class="contador">
<button onclick="rest('francesa')">-</button>
<button onclick="add('Papas francesa',90)">+</button>
</div></div>

<div class="producto">Papas gajo $90
<div class="contador">
<button onclick="rest('gajo')">-</button>
<button onclick="add('Papas gajo',90)">+</button>
</div></div>

<div class="producto">Pan de ajo $100
<div class="contador">
<button onclick="rest('pan')">-</button>
<button onclick="add('Pan de ajo',100)">+</button>
</div></div>

</div>

<!-- BEBIDAS -->
<h2>Bebidas</h2>
<div class="scroll">

<div class="producto">Coca $35<button onclick="add('Coca',35)">+</button></div>
<div class="producto">Coca Light $35<button onclick="add('Coca Light',35)">+</button></div>
<div class="producto">Sprite $35<button onclick="add('Sprite',35)">+</button></div>
<div class="producto">Agua mineral $30<button onclick="add('Agua mineral',30)">+</button></div>
<div class="producto">Té negro $30<button onclick="add('Te negro',30)">+</button></div>

</div>

<!-- PIZZAS -->
<h2>Pizzas</h2>
<div class="scroll" id="pizzas"></div>

<script>

let cart={}

function add(nombre,precio){
if(!cart[nombre]) cart[nombre]={cant:0,precio}
cart[nombre].cant++
render()
}

function rest(nombre){
if(cart[nombre]){
cart[nombre].cant--
if(cart[nombre].cant<=0) delete cart[nombre]
render()
}
}

function render(){
let items=0,total=0,html=""

for(let k in cart){
items+=cart[k].cant
total+=cart[k].cant*cart[k].precio
html+=`${k} x${cart[k].cant} ($${cart[k].precio}) 
<button onclick="rest('${k}')">❌</button><br>`
}

document.getElementById("totalItems").innerText=items
document.getElementById("totalPrecio").innerText=total
document.getElementById("lista").innerHTML=html
}

function toggle(){
let p=document.getElementById("panel")
p.style.display=p.style.display=="none"?"block":"none"
}

function enviar(){
let nombre=document.getElementById("nombre").value
if(!nombre){alert("Nombre obligatorio");return}

let texto="Pedido de "+nombre+"%0A"

for(let k in cart){
texto+=k+" x"+cart[k].cant+"%0A"
}

texto+="Total: $"+document.getElementById("totalPrecio").innerText

window.open("https://wa.me/529515813970?text="+texto)
}

let pizzas=["Marguerita","Valentina","Lucrecia","Alessia","Adriana","Kalena","Leilani","Olivia","Bianca","Francesca","Sofia","Amalia","Marietta"]

let cont=document.getElementById("pizzas")

pizzas.forEach(p=>{

cont.innerHTML+=`
<div class="producto">

<b onclick="toggleP('${p}')">${p}</b>

<div id="box-${p}" style="display:none">

<p>Selecciona tamaño:</p>

<button onclick="add('${p} Individual',150)">Individual</button>
<button onclick="add('${p} Grande',250)">Grande</button>

<p>Extra queso?</p>
<button onclick="add('${p} queso',30)">+</button>

</div>

</div>
`
})

function toggleP(p){
let d=document.getElementById("box-"+p)
d.style.display=d.style.display=="none"?"block":"none"
}

</script>

</body>
</html>
