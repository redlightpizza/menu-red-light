<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Red Light Pizza</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

header{
padding:20px;
}

.logo{
width:160px;
}

button{
background:#ff3b3b;
border:none;
color:white;
padding:10px 15px;
margin:5px;
border-radius:8px;
cursor:pointer;
}

.menu{
max-width:900px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.card{
background:#222;
border-radius:12px;
padding:10px;
}

.card img{
width:100%;
border-radius:10px;
}

.salsas{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
}

.salsa{
background:#333;
padding:10px;
border-radius:10px;
cursor:pointer;
}

.salsa img{
width:35px;
}

#pedido{
background:#222;
padding:15px;
margin:20px;
border-radius:12px;
}

#menu{
display:none;
}

</style>

</head>

<body>

<header>

<img src="logo.png" class="logo">

<h1>Red Light Pizza</h1>

</header>

<div id="inicio">

<h2>Bienvenido</h2>

<p>Selecciona cómo quieres tu pedido</p>

<button onclick="tipoPedido('Restaurante')">
Consumir en restaurante
</button>

<button onclick="tipoPedido('Domicilio')">
Domicilio / recoger
</button>

<p>
Si eliges domicilio deberás enviar tu ubicación por WhatsApp
para cotizar el envío.
</p>

</div>

<div id="menu" class="menu">

<h2>Pizzas</h2>

<div class="grid">

<div class="card">

<img src="pizza1.jpg">

<h3>Marguerita</h3>

<button onclick="pizza('Marguerita')">Seleccionar</button>

</div>

<div class="card">

<img src="pizza2.jpg">

<h3>Valentina</h3>

<button onclick="pizza('Valentina')">Seleccionar</button>

</div>

<div class="card">

<img src="pizza3.jpg">

<h3>Francesca</h3>

<button onclick="pizza('Francesca')">Seleccionar</button>

</div>

</div>

<h2>Pastas</h2>

<div class="grid">

<div class="card">

<img src="pasta1.jpg">

<h3>Pasta Pomodoro</h3>

<button onclick="pasta('Pomodoro')">Seleccionar</button>

</div>

<div class="card">

<img src="pasta2.jpg">

<h3>Pasta Alfredo</h3>

<button onclick="pasta('Alfredo')">Seleccionar</button>

</div>

</div>

<h2>Salsas</h2>

<div class="salsas">

<div class="salsa" onclick="agregarSalsa('Ranch')">
<img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
<p>Ranch</p>
</div>

<div class="salsa" onclick="agregarSalsa('BBQ')">
<img src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png">
<p>BBQ</p>
</div>

<div class="salsa" onclick="agregarSalsa('Buffalo')">
<img src="https://cdn-icons-png.flaticon.com/512/135/135620.png">
<p>Buffalo</p>
</div>

</div>

<div id="pedido">

<h3>Tu pedido</h3>

<div id="lista"></div>

<button onclick="enviar()">Enviar pedido</button>

</div>

</div>

<script>

let tipo=""
let pedido=[]
let salsas=[]

function tipoPedido(opcion){

tipo=opcion

document.getElementById("inicio").style.display="none"
document.getElementById("menu").style.display="block"

}

function pizza(nombre){

let tamańo=prompt("Tamańo: 1 Individual / 2 Grande")

let queso=prompt("żQueso extra? 1 No / 2 Sí")

let texto="Pizza "+nombre

if(tamańo==1) texto+=" (Individual)"
if(tamańo==2) texto+=" (Grande)"

if(queso==2) texto+=" + queso extra"

pedido.push(texto)

mostrar()

}

function pasta(nombre){

let proteina=prompt("żAgregar proteína? 1 No / 2 Chicken Tenders")

let texto="Pasta "+nombre

if(proteina==2) texto+=" + Chicken Tenders"

pedido.push(texto)

mostrar()

}

function agregarSalsa(nombre){

salsas.push(nombre)

mostrar()

}

function mostrar(){

let lista=""

pedido.forEach(p=>{

lista+="<p>"+p+"</p>"

})

if(salsas.length>0){

lista+="<p>Salsas: "+salsas.join(", ")+"</p>"

}

document.getElementById("lista").innerHTML=lista

}

function enviar(){

let texto="Pedido Red Light Pizza %0A"

texto+="Tipo: "+tipo+"%0A%0A"

pedido.forEach(p=>{

texto+="- "+p+"%0A"

})

if(salsas.length>0){

texto+="Salsas: "+salsas.join(", ")+"%0A"

}

if(tipo=="Domicilio"){

texto+="Enviar ubicación para cotizar envío."

}

let url="https://wa.me/529511108841?text="+texto

window.open(url)

}

</script>

</body>
</html>
