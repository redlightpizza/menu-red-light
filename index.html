<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Menú - Pedido</title>

<style>

body{
font-family: Arial;
background:#fff;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.menu{
max-width:600px;
margin:auto;
}

.bloque{
border:1px solid #ddd;
padding:15px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#e63946;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#c1121f;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
}

.oculto{
display:none;
}

</style>
</head>

<body>

<h1>Realizar Pedido</h1>

<div class="menu">

<div class="bloque">

<label>Tipo de pedido</label>

<select id="tipoPedido">
<option value="">Seleccionar</option>
<option value="domicilio">A domicilio</option>
<option value="recoger">Pasar a recoger</option>
</select>

<p id="mensajeDomicilio" class="oculto">
Para pedidos a domicilio envíanos tu ubicación por WhatsApp para cotizar el envío.
</p>

</div>


<div class="bloque">

<h3>Pizza</h3>

<label>Tamaño</label>

<select id="tamanoPizza">
<option value="">Seleccionar tamaño</option>
<option value="Individual">Individual</option>
<option value="Grande">Grande</option>
</select>

</div>


<div class="bloque">

<label>¿Deseas agregar salsa o aderezo?</label>

<select id="salsaPregunta">
<option value="">Seleccionar</option>
<option value="si">Sí</option>
<option value="no">No</option>
</select>

<div id="opcionesSalsas" class="oculto">

<label>Salsas / Aderezos</label>

<select id="salsaElegida">
<option value="">Seleccionar</option>
<option>Ranch</option>
<option>Chipotle</option>
<option>BBQ</option>
<option>Habanero</option>
<option>Catsup</option>
</select>

</div>

</div>


<div class="bloque">

<label>Pedido a nombre de</label>

<input type="text" id="nombrePedido" placeholder="Nombre">

</div>


<div class="bloque">

<button onclick="enviarPedido()">Enviar pedido por WhatsApp</button>

</div>

</div>


<script>

const pregunta = document.getElementById("salsaPregunta");
const opciones = document.getElementById("opcionesSalsas");

pregunta.addEventListener("change",function(){

if(this.value === "si"){
opciones.style.display="block";
}else{
opciones.style.display="none";
}

});

const tipoPedido = document.getElementById("tipoPedido");
const mensaje = document.getElementById("mensajeDomicilio");

tipoPedido.addEventListener("change",function(){

if(this.value === "domicilio"){
mensaje.style.display="block";
}else{
mensaje.style.display="none";
}

});


function enviarPedido(){

let tipo = document.getElementById("tipoPedido").value;
let tamano = document.getElementById("tamanoPizza").value;
let salsa = document.getElementById("salsaElegida").value;
let nombre = document.getElementById("nombrePedido").value;

let texto="PEDIDO:%0A";

texto += "Tipo de pedido: "+tipo+"%0A";
texto += "Pizza tamaño: "+tamano+"%0A";

if(salsa){
texto += "Salsa/aderezo: "+salsa+"%0A";
}

texto += "A nombre de: "+nombre;

let telefono="5219515813970";

let url="https://wa.me/"+telefono+"?text="+texto;

window.open(url);

}

</script>

</body>
</html>
