<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Light Pizza - Menú</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; text-align: center; }
        .logo { color: #ff0000; font-size: 2.5rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; }
        .btn-container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn { background-color: #ff0000; color: white; border: none; padding: 15px; font-size: 1.1rem; border-radius: 8px; cursor: pointer; text-decoration: none; font-weight: bold; }
        #menu-content { display: none; margin-top: 30px; text-align: left; }
        .item { border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between; }
        .item-name { color: #ff0000; font-weight: bold; }
        h2 { border-bottom: 2px solid #ff0000; padding-bottom: 5px; margin-top: 25px; }
    </style>
</head>
<body>

    <div class="logo">Red Light Pizza</div>
    <p>Selecciona cómo quieres tu pedido:</p>

    <div class="btn-container">
        <button class="btn" onclick="mostrarMenu()">Consumir en restaurante</button>
        <a href="https://wa.me/tu_numero_aqui" class="btn">Domicilio / Recoger</a>
    </div>

    <div id="menu-content">
        <h2>Pizzas Especiales</h2>
        <div class="item"><span class="item-name">Francesca</span> <span>$---</span></div>
        <div class="item"><span class="item-name">Amalia</span> <span>$---</span></div>
        
        <h2>Entradas</h2>
        <div class="item"><span class="item-name">Papas Gajo</span> <span>$---</span></div>
        
        <h2>Bebidas</h2>
        <div class="item"><span class="item-name">Cerveza Nacional</span> <span>$---</span></div>
        <div class="item"><span class="item-name">Artesanales</span> <span>$---</span></div>
    </div>

    <script>
        function mostrarMenu() {
            document.getElementById('menu-content').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
