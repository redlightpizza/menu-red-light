<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
}

h1{
color:#ff3c00;
}

button{
margin:5px;
padding:10px;
border:none;
border-radius:10px;
background:#ff3c00;
color:white;
font-size:16px;
}

.producto{
border-bottom:1px solid #333;
padding:10px;
}

.desc{
font-size:14px;
color:#ccc;
}

.contador button{
padding:5px 10px;
}

#carrito{
position:fixed;
top:10px;
right:10px;
background:#ff3c00;
padding:10px;
border-radius:10px;
}

#carritoDetalle{
display:none;
position:fixed;
top:60px;
right:10px;
background:#111;
padding:15px;
border-radius:10px;
width:250px;
}
</style>
</head>

<body>

<div id="idioma">
<h2>🌎 Elige tu idioma / Choose language</h2>
<button onclick="iniciarMenu()">Español 🇲🇽</button>
<button onclick="iniciarMenu()">English 🇺🇸</button>
</div>

<div id="menu" style="display:none">

<h1>🍕 Red Light Pizza</h1>

<div id="carrito" onclick="toggleCarrito()">🛒 <span id="total">0</span></div>

<div id="carritoDetalle">
<h3>🛒 Tu pedido</h3>
<div id="listaPedido"></div>

<p>¿Agregar algo más?</p>
<button onclick="agregarExtra('Aderezo')">🧄 Aderezo $25</button>
<button onclick="agregarExtra('Bebida')">🥤 Bebida</button>

<button onclick="enviarPedido()">📲 Enviar pedido</button>
</div>

<div>
<button onclick="mostrar('entradas')">🍗 Entradas</button>
<button onclick="mostrar('pizzas')">🍕 Pizzas</button>
<button onclick="mostrar('bebidas')">🥤 Bebidas</button>
</div>

<!-- ENTRADAS -->
<div id="entradas" class="categoriaMenu" style="display:none">

<div class="producto">Chicken Tenders
<div class="desc">Trozos de pechuga al horno</div>
<div class="contador">
<button onclick="restar('Chicken_Tenders')">-</button>
<span id="cant-Chicken_Tenders">0</span>
<button onclick="sumar('Chicken_Tenders')">+</button>
</div>
</div>

<div class="producto">Papas francesa
<div class="contador">
<button onclick="restar('Papas_francesa')">-</button>
<span id="cant-Papas_francesa">0</span>
<button onclick="sumar('Papas_francesa')">+</button>
</div>
</div>

</div>

<!-- BEBIDAS -->
<div id="bebidas" class="categoriaMenu" style="display:none">

<div class="producto">Coca
<div class="contador">
<button onclick="restar('Coca')">-</button>
<span id="cant-Coca">0</span>
<button onclick="sumar('Coca')">+</button>
</div>
</div>

<div class="producto">Coca light
<div class="contador">
<button onclick="restar('Coca_light')">-</button>
<span id="cant-Coca_light">0</span>
<button onclick="sumar('Coca_light')">+</button>
</div>
</div>

<div class="producto">Sprite
<div class="contador">
<button onclick="restar('Sprite')">-</button>
<span id="cant-Sprite">0</span>
<button onclick="sumar('Sprite')">+</button>
</div>
</div>

<div class="producto">Agua mineral
<div class="contador">
<button onclick="restar('Agua_mineral')">-</button>
<span id="cant-Agua_mineral">0</span>
<button onclick="sumar('Agua_mineral')">+</button>
</div>
</div>

<div class="producto">Te negro
<div class="contador">
<button onclick="restar('Te_negro')">-</button>
<span id="cant-Te_negro">0</span>
<button onclick="sumar('Te_negro')">+</button>
</div>
</div>

</div>

<!-- PIZZAS -->
<div id="pizzas" class="categoriaMenu" style="display:none"></div>

</div>

<script>

function iniciarMenu(){
document.getElementById("idioma").style.display="none"
document.getElementById("menu").style.display="block"
cargarPizzas()
}

function mostrar(cat){
document.querySelectorAll(".categoriaMenu").forEach(d=>d.style.display="none")
document.getElementById(cat).style.display="block"
}

function sumar(id){
let s=document.getElementById("cant-"+id)
s.innerText=parseInt(s.innerText)+1
actualizarCarrito()
actualizarLista()
}

function restar(id){
let s=document.getElementById("cant-"+id)
let v=parseInt(s.innerText)
if(v>0){s.innerText=v-1}
actualizarCarrito()
actualizarLista()
}

function actualizarCarrito(){
let total=0
document.querySelectorAll("[id^='cant-']").forEach(e=>{
total+=parseInt(e.innerText)
})
document.getElementById("total").innerText=total
}

function toggleCarrito(){
let c=document.getElementById("carritoDetalle")
c.style.display=c.style.display=="none"?"block":"none"
actualizarLista()
}

function actualizarLista(){
let lista=""
document.querySelectorAll("[id^='cant-']").forEach(e=>{
let n=e.innerText
if(n>0){
lista+=e.id.replace("cant-","")+" x"+n+"<br>"
}
})
document.getElementById("listaPedido").innerHTML=lista
}

function agregarExtra(nombre){
let id="extra-"+nombre

if(!document.getElementById("cant-"+id)){
let s=document.createElement("span")
s.id="cant-"+id
s.innerText=1
s.style.display="none"
document.body.appendChild(s)
}else{
let s=document.getElementById("cant-"+id)
s.innerText=parseInt(s.innerText)+1
}

actualizarCarrito()
actualizarLista()
}

function cargarPizzas(){

let pizzas=["Marguerita","Valentina","Lucrecia","Alessia","Adriana","Kalena","Leilani","Olivia","Bianca","Francesca","Sofia","Amalia","Marietta"]

let c=document.getElementById("pizzas")

pizzas.forEach(p=>{

c.innerHTML+=`

<div class="producto">
🍕 <b onclick="togglePizza('${p}')">${p}</b>

<div id="box-${p}" style="display:none">

<button onclick="agregarPizza('${p}','Individual')">Individual</button>
<button onclick="agregarPizza('${p}','Grande')">Grande</button>

</div>

</div>

`

})

}

function togglePizza(p){
let d=document.getElementById("box-"+p)
d.style.display=d.style.display=="none"?"block":"none"
}

function agregarPizza(p,tam){

let id=p+"_"+tam
sumar(id)

let cont=document.getElementById("box-"+p)

cont.innerHTML+=`
<p>🧀 ¿Extra queso?</p>
<button onclick="sumar('${id}_queso')">Sí</button>
`

}

function enviarPedido(){
alert("Pedido enviado (simulación)")
}

</script>

</body>
</html>
